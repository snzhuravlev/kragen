# Kragen — application configuration (single source of truth).
# Override any key via environment: KRAGEN_<SECTION>__<KEY> (nested sections use __).
# Example: KRAGEN_DATABASE__URL=postgresql+asyncpg://user:pass@127.0.0.1:5432/kragen
#
# Path to this file: set KRAGEN_CONFIG_FILE=/absolute/path/to/kragen.yaml (optional).

app:
  name: kragen
  environment: local
  log_level: INFO

api:
  host: 0.0.0.0
  port: 8000
  # public_base_url: "https://api.example.com"  # used for worker KRAGEN_API_URL when set

# Server-side download into logical storage (POST /files/import).
# file_import:
#   max_bytes: 104857600
#   timeout_seconds: 60
#   allowed_host_suffixes: []  # e.g. [ "postgresql.org" ] in production; empty = any host (dev)
#   allowed_mime_prefixes: []  # e.g. [ "application/pdf" ]; empty = any MIME

database:
  # Keep secrets in environment (KRAGEN_DATABASE__URL).
  url: postgresql+asyncpg://kragen:CHANGE_ME@127.0.0.1:5432/kragen

storage:
  endpoint_url: http://127.0.0.1:9000
  access_key: CHANGE_ME
  secret_key: CHANGE_ME
  bucket: kragen

auth:
  jwt_secret: change-me-in-production
  jwt_algorithm: HS256
  jwt_issuer: null
  jwt_audience: null
  oidc_jwks_url: null
  # Development/legacy fallback. Must be false in production.
  raw_uuid_bearer_enabled: true
  disabled: false
  dev_user_id: null
  # Explicit allow-list for admin API (/admin/config/*, /admin/cursor-auth/*,
  # /admin/plugins/*, /admin/workers, /admin/logs*, /admin/memory/status).
  # Empty = no one is admin — safe default.
  admin_user_ids: []

http:
  cors_allow_origins:
    - "*"

worker:
  cursor_cli_path: cursor
  workspace_root: ~/.kragen/workspaces
  timeout_seconds: 180
  retries: 1
  # Reap tasks stuck in `running` longer than this threshold.
  stuck_task_timeout_seconds: 900
  # Sweep interval for stale running task cleanup.
  task_reap_interval_seconds: 60
  memory_context_enabled: true
  memory_top_k: 4

task_stream:
  # memory | redis. Use redis when running more than one API/worker process.
  backend: memory
  redis_url: redis://127.0.0.1:6379/0
  redis_prefix: kragen:task-stream
  ttl_seconds: 3600
  block_timeout_ms: 5000

task_queue:
  # inline | redis. Use redis plus `kragen-worker` for production.
  backend: inline
  redis_url: redis://127.0.0.1:6379/0
  redis_key: kragen:task-queue
  block_timeout_seconds: 5

channels:
  openclaw_enabled: false

plugins:
  # Discover plugins exposed via the `kragen.plugins` entry-point group.
  autoload_entry_points: true
  # Allow-list: only plugins listed here are activated at boot. Everything else
  # stays discovered but disabled. Toggle at runtime via /admin/plugins/{id}/enable.
  enabled:
    # Example built-in skill: short, actionable replies.
    - id: kragen-skill-concise
      config: {}
    # Route /library/... and download requests to API/MCP, not local mkdir.
    - id: kragen-skill-kragen-storage
      config: {}
    # Cursor worker MCP: import_url -> POST /files/import (env injected per task).
    - id: kragen-mcp-kragen-files
      config: {}

telegram_channel:
  # Keep the real Telegram bot token in env: KRAGEN_TELEGRAM_BOT_TOKEN.
  bot_token: ""
  api_base_url: "http://127.0.0.1:8000"
  # Set to a JWT/OIDC token in production. Falls back to auth_user_id in dev.
  api_bearer_token: null
  auth_user_id: "00000000-0000-0000-0000-000000001111"
  default_workspace_id: "00000000-0000-0000-0000-000000001111"

  # Mode: polling | webhook
  mode: "polling"

  # Polling mode tuning
  poll_timeout_seconds: 20
  loop_delay_seconds: 0.4
  task_poll_interval_seconds: 1.0
  task_wait_timeout_seconds: 300

  # Dedup retention/cleanup
  dedup_retention_hours: 168
  dedup_cleanup_interval_seconds: 3600
  # Stuck `processing` rows older than this many minutes are marked as failed
  # by the background reaper so the same chat_id/message_id can be retried.
  dedup_processing_timeout_minutes: 30

  # Webhook mode settings (used when mode=webhook)
  webhook_public_url: "https://bot.example.com"
  webhook_path: "/telegram/webhook"
  webhook_host: "0.0.0.0"
  webhook_port: 8081
  webhook_secret_token: "TEST_WEBHOOK_SECRET_REPLACE_ME"
